<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button id="theme-btn" onclick="handleTheme()">Dark Mode</button>
    <h1>Events</h1>
    <p>Click Event</p>
    <button onclick="handleClickPara()">click</button>

    <hr>

    <button onclick="decrease()">-</button>
    <span id="counter">0</span>
    <button onclick="increase()">+</button>

    <hr>

    <img src="./Rajjj (1).jpg" alt="" height="250px" ondblclick="likeCount()">
    <br>
    <span id="likes">❤️</span>
    <hr>
    
    <script>
        let pTag = document.querySelector("p");
        function handleClickPara(){
            pTag.innerHTML = "button is clicked";
        }

        let themeBtn = document.getElementById("theme-btn");
        let theme = false;
        function handleTheme(){
            theme = !theme;
            if(theme){
                document.body.style.backgroundColor = "black";
                document.body.style.color = "white";
                themeBtn.textContent = "Light Mode"
            }
            else{
                document.body.style.backgroundColor = "white";
                document.body.style.color = "black";
                themeBtn.textContent = "Dark Mode"
            }
        }

        let counterTag = document.getElementById("counter");
        let count = 0 ;
        let increase = () => counterTag.innerHTML=++count;
        let decrease = () => (count>0)?counterTag.innerHTML=--count:count=0;
       
    
        let like = 0;
        let likes = document.getElementById("likes")
        function likeCount(){
            // document.getElementById("likes").textContent = `❤️${likes++}`;
            likes.textContent = `❤️${++like}`; 
        }

         

    </script>
</body>
</html>
